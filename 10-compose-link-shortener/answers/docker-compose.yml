services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  app:
    build: .
    deploy:
      replicas: 3
    expose:
      - "8080"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
